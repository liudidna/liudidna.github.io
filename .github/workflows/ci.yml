name: Beautiful Jekyll CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Build the site
        run: bundle exec jekyll build --future
